name: rdd2022_yolo26n

model:
  type: yolo26
  config:
    model_size: "n"
    input_size: 640
    num_classes: 5
    end2end: false
    confidence_threshold: 0.25
    iou_threshold: 0.5
    pretrained_weights: "yolo26n.pt"
    freeze_layers: 5

dataset:
  type: rdd2022
  path: model/data/rdd2022/complete
  class_mapping: model/configs/rdd2022_classes.yaml

training:
  epochs: 100
  early_stopping_patience: 15
  batch_size: 64
  num_workers: 8
  prefetch_factor: 3
  use_amp: true
  use_channels_last: true
  learning_rate: 0.01
  optimizer: MuSGD
  weight_decay: 0.0005
  momentum: 0.937
  scheduler: cosine
  warmup_epochs: 3
  val_split: 0.2
  checkpoint_dir: ./checkpoints/yolo26
  log_interval: 10
  seed: 42
  loss:
    label_smoothing: 0.01
    focal_loss: true
    focal_gamma: 1.5
    focal_alpha: 0.25
  augmentation:
    mosaic: 0.5
    mixup: 0.05
    mosaic_off_epochs: 8
    horizontal_flip: true
    vertical_flip: false
    hsv_h: 0.015
    hsv_s: 0.5
    hsv_v: 0.4
    scale: [0.75, 1.25]
    translate: 0.1

evaluation:
  iou_thresholds: [0.5]
  confidence_threshold: 0.25

output:
  checkpoint_dir: ./checkpoints/yolo26
  results_dir: ./checkpoints/yolo26
  log_dir: ./logs/yolo26
