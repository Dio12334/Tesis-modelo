# RDD2022 class mapping configuration
# Maps Dataset Ninja class names to the framework's target taxonomy.
#
# Dataset Ninja classes (from meta.json):
#   - longitudinal crack (D00)
#   - transverse crack (D10)
#   - alligator crack (D20)
#   - pothole (D40)
#   - other corruption
#   - block crack
#   - repair
#
# Original RDD2022 codes (from sekilab/RoadDamageDetector):
#   - D00: Longitudinal Crack
#   - D10: Transverse Crack
#   - D20: Alligator Crack
#   - D40: Pothole

taxonomy:
  - bache
  - fisura_longitudinal
  - fisura_transversal
  - piel_de_cocodrilo
  - otro

mappings:
  # Dataset Ninja format class names
  longitudinal crack: fisura_longitudinal
  transverse crack: fisura_transversal
  alligator crack: piel_de_cocodrilo
  pothole: bache
  other corruption: otro
  block crack: piel_de_cocodrilo
  repair: otro
  # Original RDD2022 code-based class names
  D00: fisura_longitudinal
  D10: fisura_transversal
  D20: piel_de_cocodrilo
  D40: bache

default_class: null
