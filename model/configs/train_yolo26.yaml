name: rdd2022_yolo26n

model:
  type: yolo26
  config:
    model_size: "n"
    input_size: 640
    num_classes: 5
    end2end: false
    confidence_threshold: 0.25
    iou_threshold: 0.5
    pretrained_weights: "yolo26n.pt"
    # YOLO26 native features (always active, not configurable):
    # - ProgLoss (Progressive Loss Balancing)
    # - STAL (Small-Target-Aware Label Assignment)
    # - MuSGD optimizer (SGD + Muon hybrid)

dataset:
  type: rdd2022
  path: model/data/rdd2022/sample
  class_mapping: model/configs/rdd2022_classes.yaml

training:
  epochs: 50
  early_stopping_patience: 10
  batch_size: 8
  num_workers: 0
  use_amp: true
  learning_rate: 0.01
  optimizer: MuSGD
  weight_decay: 0.0005
  momentum: 0.937
  scheduler: cosine
  warmup_epochs: 3
  val_split: 0.2
  checkpoint_dir: ./checkpoints/yolo26
  log_interval: 10

evaluation:
  iou_thresholds: [0.5]
  confidence_threshold: 0.25

output:
  checkpoint_dir: ./checkpoints/yolo26
  results_dir: ./checkpoints/yolo26
  log_dir: ./logs/yolo26
