name: rdd2022_yolo26n

model:
  type: yolo26
  config:
    model_size: "n"
    input_size: 640
    num_classes: 5
    end2end: false
    confidence_threshold: 0.25
    iou_threshold: 0.5
    pretrained_weights: "yolo26n.pt"

dataset:
  type: rdd2022
  path: model/data/rdd2022/sample
  class_mapping: model/configs/rdd2022_classes.yaml

training:
  epochs: 100
  early_stopping_patience: 25
  batch_size: 16
  num_workers: 4
  use_amp: false
  learning_rate: 0.0005
  optimizer: MuSGD
  weight_decay: 0.005
  momentum: 0.937
  scheduler: cosine
  warmup_epochs: 5
  val_split: 0.2
  checkpoint_dir: ./checkpoints/yolo26
  log_interval: 10
  seed: 42
  augmentation:
    horizontal_flip: true
    rotation_range: 10
    brightness_range: [0.8, 1.2]

  
evaluation:
  iou_thresholds: [0.25]
  confidence_threshold: 0.25

output:
  checkpoint_dir: ./checkpoints/yolo26
  results_dir: ./checkpoints/yolo26
  log_dir: ./logs/yolo26
