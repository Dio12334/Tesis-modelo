name: rdd2022_yolo26n

model:
  type: yolo26
  config:
    model_size: "m"
    input_size: 640
    num_classes: 5
    end2end: false
    confidence_threshold: 0.25
    iou_threshold: 0.5
    pretrained_weights: "yolo26m.pt"

dataset:
  type: rdd2022
  path: model/data/rdd2022/sample
  class_mapping: model/configs/rdd2022_classes.yaml

training:
  epochs: 200
  early_stopping_patience: 50
  batch_size: 16
  num_workers: 4
  use_amp: true
  learning_rate: 0.01
  optimizer: MuSGD
  weight_decay: 0.0005
  momentum: 0.937
  scheduler: cosine
  warmup_epochs: 5
  val_split: 0.2
  checkpoint_dir: ./checkpoints/yolo26
  log_interval: 10
  seed: 42
  num_workers: 12
  augmentation:
    horizontal_flip: true
    brightness_range: [0.7, 1.3]
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    scale: [0.5, 1.5]

  
evaluation:
  iou_thresholds: [0.5]
  confidence_threshold: 0.25

output:
  checkpoint_dir: ./checkpoints/yolo26
  results_dir: ./checkpoints/yolo26
  log_dir: ./logs/yolo26
